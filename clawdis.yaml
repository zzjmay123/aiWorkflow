name: ai-workflow
version: 1.0.0
description: AI 资讯自动化工作流 — 自动抓取 10+ 科技媒体最新新闻，生成小红书风格图片，一键发布。| AI News Automation Workflow — Auto-scrape tech news, generate Xiaohongshu-style images, and publish automatically.
author:
  name: Jony (zzjmay123)
license: MIT
type: utility

runtime:
  requires_binaries: true
  requires_credentials: false
  requires_network: true

runtime_binaries:
  required:
    - python3
    - playwright
    - xiaohongshu-cli

runtime_credentials:
  required: []
  notes:
    - 可选：飞书应用凭证（用于通知）
    - 必需：小红书账号授权（xiaohongshu auth login）

security:
  install_time_executes_code: true
  runtime_agent_executes_code: true
  runtime_agent_network_access: true
  reads_local_config: false

tags:
  - ai
  - xiaohongshu
  - automation
  - news
  - media
  - content-creation
  - copaw
